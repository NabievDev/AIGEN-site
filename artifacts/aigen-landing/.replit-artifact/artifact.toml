kind = "web"
previewPath = "/"
title = "AIGEN Intensive — Летний интенсив по ИИ"
version = "1.0.0"
id = "artifacts/aigen-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21086

[services.development]
run = "pnpm --filter @workspace/aigen-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aigen-landing", "run", "build" ]
publicDir = "artifacts/aigen-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21086"
BASE_PATH = "/"
